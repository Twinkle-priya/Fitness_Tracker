name: Fitness Tracker CI Pipeline

on:
  push:
    branches: [ "master", "develop" ]
  pull_request:
    branches: [ "master", "develop" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/fitness-tracker:${{ github.sha }} .

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/fitness-tracker:${{ github.sha }}

      - name: Tag Latest Image
        run: |
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/fitness-tracker:${{ github.sha }} \
                     ${{ secrets.DOCKERHUB_USERNAME }}/fitness-tracker:latest

      - name: Push Latest Tag
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/fitness-tracker:latest
